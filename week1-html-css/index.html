<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <h2 class="header__logo">Logo</h2>
        <nav class="header__nav">
          <ul class="nav__list">
            <li class="nav__item">
              <a href="#home" class="nav__link active">Home</a>
            </li>
            <li class="nav__item">
              <a href="#articles" class="nav__link">Articles</a>
            </li>
            <li class="nav__item">
              <a href="#about" class="nav__link">About</a>
            </li>
            <li class="nav__item">
              <a href="#contact" class="nav__link">Contact</a>
            </li>
          </ul>
        </nav>
        <button type="button" class="header__button">Sign In</button>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="container">
          <div class="hero__left">
            <h1 class="hero__title">Welcome</h1>
            <p class="hero__subtitle">
              Lorem ipsum dolor sit amet consectetur adipisicing elit. Dicta,
              pariatur!
            </p>
            <button type="button" class="hero__button">Get Started</button>
          </div>
          <div class="hero__right">
            <img
              src="https://picsum.photos/600/400"
              alt="Hero Image"
              class="hero__image"
            />
          </div>
        </div>
      </section>
      <section class="articles"></section>
      <section class="about"></section>
    </main>
    <footer></footer>
  </body>
</html>
